<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | I & E Lab</title>
    <style>
        :root {
            --sx-deep-green: #0F3D2E;
            --sx-navy-green: #123C34;
            --sx-blue-black: #0B1F2A;
            --sx-yellow: #F4B400;
            --sx-white: #FFFFFF;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--sx-blue-black) 0%, var(--sx-navy-green) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--sx-yellow), var(--sx-deep-green));
            margin: 0 auto 20px;
        }

        h2 {
            color: var(--sx-blue-black);
            margin-bottom: 10px;
            font-size: 24px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--sx-yellow);
            box-shadow: 0 0 0 3px rgba(244, 180, 0, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--sx-deep-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #145A45;
        }

        .error-box {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #fee2e2;
        }

        .footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="brand-logo"></div>
        <h2>Admin Portal</h2>
        <p class="subtitle">Enter your credentials to access the lab panel</p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin_user" required autofocus>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Secure Login</button>
        </form>
    </div>

    <div class="footer">
        &copy; 2026 Solunex Technologies | <strong>I & E Lab Platform</strong>
    </div>
</div>

</body>
</html>
