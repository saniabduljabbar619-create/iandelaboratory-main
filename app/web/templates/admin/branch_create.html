{% extends "layouts/base.html" %}

{% block page_css %}
<link rel="stylesheet" href="/static/css/branch_create.css">
{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h2 class="page-title">Create Branch</h2>
        <p class="page-subtitle">Register a new operational lab branch</p>
    </div>
</div>

<div class="card form-card">

    <form method="post" class="sx-form">

        <div class="form-group">
            <label>Branch Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address">
        </div>

        <div class="form-actions">
            <a href="/admin/branches" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">
                Create Branch
            </button>
        </div>

    </form>

</div>

{% endblock %}
